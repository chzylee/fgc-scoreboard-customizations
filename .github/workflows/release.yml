name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build zip
        run: zip -r fgc-scoreboard-customizations.zip _overlays/ sc/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: fgc-scoreboard-customizations.zip
